name: Build and Push Images to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'vote/**'
      - 'result/**'
      - 'worker/**'
      - 'seed-data/**'
      - '.github/workflows/acr-build-push.yml'
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: azureakhilcicd.azurecr.io
  IMAGE_PREFIX: example-voting-app

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: vote
            context: vote
            dockerfile: vote/Dockerfile
          - service: result
            context: result
            dockerfile: result/Dockerfile
          - service: worker
            context: worker
            dockerfile: worker/Dockerfile
          - service: seed-data
            context: seed-data
            dockerfile: seed-data/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.run_number }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
